載入 (&L)
	開啟媒體檔案 (&O)		no-osd script-message open
	載入字幕軌 (&S)		no-osd script-message add_subtitle
	載入音軌 (&A)		no-osd script-message add_audio
	剪貼簿網址 (&C)		update-clipboard text; loadfile ${clipboard/text}; show-text '+ ${clipboard/text}'

軌道聚合列表	$tracks

導航 (&N)
	播放清單 (&P)		$playlist
	版本列表 (&E)		$editions
	章節列表 (&C)		$chapters
	影片軌列表 (&V)		$video-tracks
	音訊軌列表 (&A)		$audio-tracks
	字幕軌列表 (&S)		$sub-tracks
	播放清單隨機重排 (&R)	playlist-shuffle

播放 (&P)
	上一幀				frame-back-step
	下一幀				frame-step
	設定/清除 AB 循環點 (&A)	ab-loop
	速度 (&S)
		50%			set speed 0.5	checked=speed == 0.5
		100% (&1)		set speed 1	checked=speed == 1
		150% (&2)		set speed 1.5	checked=speed == 1.5
		200% (&3)		set speed 2	checked=speed == 2

	音量 -		add volume -1
	音量 +		add volume  1

	音訊預載 100ms		add audio-delay -0.1
	音訊延遲 100ms		add audio-delay  0.1
	字幕預載 100ms		add sub-delay -0.1
	字幕延遲 100ms		add sub-delay  0.1

	重置音訊與字幕同步 (&R)	set audio-delay 0; set sub-delay 0

	---
	從頭播放			script-binding toggle-resume

著色器選單 (&G)	script-binding shader-menu
VCS 章節牆 (&V)	script-binding vcs-wall

VF 濾鏡 (&F)
	清空 (&C)	vf clr ""
	預設 補幀 MVTools_快速			vf set vapoursynth="~~/vs/MEMC_MVT_LQ.vpy"
	預設 補幀 RIFE_DX12				vf set vapoursynth="~~/vs/MEMC_RIFE_DML.vpy"
	預設 補幀 DRBA_DX12				vf set vapoursynth="~~/vs/MEMC_DRBA_DML.vpy"
	預設 補幀 RIFE_RTX (DLC-vsNV)	vf set vapoursynth="~~/vs/MEMC_RIFE_NV.vpy"
	預設 補幀 DRBA_RTX (DLC-vsNV)	vf set vapoursynth="~~/vs/MEMC_DRBA_NV.vpy"
	預設 自訂AI UAI_DX12			vf set vapoursynth="~~/vs/MIX_UAI_DML.vpy"
	預設 自訂AI UAI_RTX (DLC-vsNV)	vf set vapoursynth="~~/vs/MIX_UAI_NV_TRT.vpy"

截圖 (&K)
	原始影片（無OSD）		no-osd script-binding screenshot_namer/ss_video
	視窗含OSD (&S)		no-osd script-binding screenshot_namer/ss_sub
	視窗				no-osd script-binding screenshot_namer/ss_win
	截圖設定 (&C)		script-binding screenshot-menu

下載 (&D)
	最佳畫質		no-osd script-message-to ytdl_download ytdl_best
	1080p（目前）		no-osd script-message-to ytdl_download ytdl_1080p
	720p			no-osd script-message-to ytdl_download ytdl_720p
	---
	最佳音訊		no-osd script-message-to ytdl_download ytdl_audio_best
	m4a 音訊		no-osd script-message-to ytdl_download ytdl_audio_m4a
	---
	輸出格式
		MP4		no-osd script-message-to ytdl_download ytdl_fmt_mp4
		MKV		no-osd script-message-to ytdl_download ytdl_fmt_mkv
	---
	開啟下載資料夾		no-osd script-message-to ytdl_download ytdl_open_folder
	下載設定		script-message-to ytdl_download ytdl_settings

影片 (&V)
	切換 解碼模式 (&H)		cycle-values hwdec "auto" "auto-copy" "no"
	切換 去色帶狀態 (&D)	cycle deband		checked=deband
	切換 去交錯狀態 (&I)	cycle deinterlace	checked=deinterlace_active
	切換 自動校色			cycle icc-profile-auto
	均衡器 (&E)
		對比度 -	add contrast -1
		對比度 +	add contrast  1
		亮度 -		add brightness -1
		亮度 +		add brightness  1
		伽瑪 -		add gamma -1
		伽瑪 +		add gamma  1
		飽和度 -	add saturation -1
		飽和度 +	add saturation  1
		色相 -		add hue -1
		色相 +		add hue  1
		重置全部 (&R)	set contrast 0 ; set brightness 0 ; set gamma 0 ; set saturation 0 ; set hue 0

字幕字型 (&F)
	微軟正黑體（目前）	set sub-font "Microsoft JhengHei"
	霞鶩文楷等寬		set sub-font "LXGW WenKai Mono Lite"
	標楷體			set sub-font "DFKai-SB"
	細明體			set sub-font "MingLiU"
	編輯 mpv.conf		script-message-to input_plus edit "~~/mpv.conf"

字幕顏色 (&S)
	白色（目前）	set sub-color #FFFFFFFF
	黃色		set sub-color #FFFFD766
	青色		set sub-color #FF00FFFF
	綠色		set sub-color #FF00FF00
	紅色		set sub-color #FFFF0000
	復原預設		set sub-color #FFD766
	編輯設定檔 (mpv.conf)	script-message-to input_plus edit "~~/mpv.conf"

字幕樣式設定 (&Y)	script-binding subtitle-menu

速度選單 (0.1 微調)	script-binding speed-menu
VF 濾鏡選單		script-binding vf-menu
字幕樣式設定 (F11)	script-binding subtitle-menu

工具 (&T)
	按鍵綁定列表				script-binding select/select-binding
	常駐顯示統計資訊 (&S)		no-osd script-binding input_plus/info_toggle
	顯示OSD命令列/控制台 (&C)	script-binding commands/open
	清除已記錄的屬性值			script-message-to save_global_props clean_data
	切換視窗邊框 (&B)			cycle border	checked=border
	切換視窗頂置 (&O)			cycle ontop		checked=ontop
	按鍵名檢測					script-binding input_plus/input_test_toggle
	開啟select總選單 (&M)		script-binding select/menu
	屬性列表					script-binding select/show-properties
	音訊輸出裝置列表 (&A)		$audio-devices

關於 (&I)
	專案首頁 (&H)	script-message-to input_plus lazy-helper 0
	mpv手冊 (&M)	script-message-to input_plus lazy-helper 1
	中文手冊 (&C)	script-message-to input_plus lazy-helper 2
	FAQ (&F)		script-message-to input_plus lazy-helper 3
	濾鏡指北		script-message-to input_plus lazy-helper 4
	著色器指南		script-message-to input_plus lazy-helper 5

停止 (&X)		stop	disabled=idle_active
退出mpv (&Q)	quit
