### input.conf — ModernZ + mpv-lazy 快捷鍵配置
### 文件_ https://github.com/hooke007/mpv_PlayKit/blob/main/portable_config/input_uosc.conf

### ====================== 檔案瀏覽 ======================
# Ctrl+O / Ctrl+Shift+S / Ctrl+Shift+A 由 open-file.lua 內部註冊
Ctrl+c            script-binding archive-media                            # 歸檔整理目前檔案

### ====================== 播放控制 ======================
,                 frame-back-step                                         # 上一幀
.                 frame-step                                              # 下一幀
l                 ab-loop                                                 # 設定/清除 AB 循環點
SPACE             cycle pause                                             # 暫停/播放

### ====================== 速度控制 ======================
[                 no-osd add speed -0.1                                    # 減速 0.1
]                 no-osd add speed 0.1                                     # 加速 0.1
Ctrl+[            no-osd cycle-values speed 2 1.5 1.2 1                  # 切換速度 -
Ctrl+]            no-osd cycle-values speed 1 1.2 1.5 2                  # 切換速度 +
{                 no-osd add speed -0.1                                    # 減速 0.1（同 [）
}                 no-osd add speed 0.1                                     # 加速 0.1（同 ]）

### ====================== 音量控制 ======================
-                 no-osd add volume -1                                    # 音量 -（主鍵盤）
=                 no-osd add volume 1                                     # 音量 +（主鍵盤 =）
+                 no-osd add volume 1                                     # 音量 +（Shift+=）
KP_SUBTRACT       no-osd add volume -1                                    # 音量 -（數字鍵盤）
KP_ADD            no-osd add volume 1                                     # 音量 +（數字鍵盤）

### ====================== 音訊/字幕延遲 ======================
c                 add audio-delay -0.1                                    # 音訊預載 100ms
v                 add audio-delay 0.1                                     # 音訊延遲 100ms
z                 add sub-delay -0.1                                      # 字幕預載 100ms
x                 add sub-delay 0.1                                       # 字幕延遲 100ms
Shift+BS          set audio-delay 0 ; set sub-delay 0                     # 重置同步

### ====================== VF 濾鏡 ======================
~                 vf clr ""                                               # 清空
!                 vf set vapoursynth="~~/vs/MEMC_MVT_LQ.vpy"              # 補幀 MVTools_快速
@                 vf set vapoursynth="~~/vs/MEMC_RIFE_DML.vpy"            # 補幀 RIFE_DX12
SHARP             vf set vapoursynth="~~/vs/MEMC_DRBA_DML.vpy"            # 補幀 DRBA_DX12
$                 vf set vapoursynth="~~/vs/MEMC_RIFE_NV.vpy"             # 補幀 RIFE_RTX
%                 vf set vapoursynth="~~/vs/MEMC_DRBA_NV.vpy"             # 補幀 DRBA_RTX
^                 vf set vapoursynth="~~/vs/MIX_UAI_DML.vpy"              # AI UAI_DX12
&                 vf set vapoursynth="~~/vs/MIX_UAI_NV_TRT.vpy"           # AI UAI_RTX

### ====================== 著色器 ======================
Ctrl+`            change-list glsl-shaders clr ""                         # 清空
F8                script-binding shader-menu                              # 著色器選單
F10               script-binding vf-menu                                  # VF 濾鏡選單
F11               script-binding subtitle-menu                            # 字幕樣式設定

Ctrl+1            change-list glsl-shaders toggle "~~/shaders/Ani/Ani4Kv2_ArtCNN_C4F32_i2_dx.glsl"
Ctrl+2            change-list glsl-shaders toggle "~~/shaders/Ani/AniSD_ArtCNN_C4F32_i4_dx.glsl"
Ctrl+3            change-list glsl-shaders toggle "~~/shaders/FSRCNNX/FSRCNNX_x2_16_0_4_1.glsl"
Ctrl+4            change-list glsl-shaders toggle "~~/shaders/EDI/nnedi3_nns64_win8x4.glsl"
Ctrl+5            change-list glsl-shaders toggle "~~/shaders/Anime4K/Anime4K_Restore_CNN_L.glsl"
Ctrl+6            change-list glsl-shaders toggle "~~/shaders/Anime4K/Anime4K_Upscale_GAN_x2_M.glsl"
Ctrl+7            change-list glsl-shaders toggle "~~/shaders/ESRGAN/k7_modernAnime_FHD_x2.glsl"
Ctrl+8            change-list glsl-shaders toggle "~~/shaders/ESRGAN/k7_modernAnime_DT_FHD_x2.glsl"
Ctrl+9            change-list glsl-shaders toggle "~~/shaders/QCOM/QCOM_SGEDS_ms_RT.glsl"
Ctrl+0            change-list glsl-shaders toggle "~~/shaders/Adaptive_sharpen/Adaptive_sharpen_lite_RT.glsl"

### ====================== 截圖 ======================
# 截圖命名由 screenshot_namer.lua 控制（檔名-時間戳-日期）
# Ctrl+s / Ctrl+S 由該腳本內部註冊

### ====================== 影片均衡器 ======================
1                 add contrast -1
2                 add contrast 1
3                 add brightness -1
4                 add brightness 1
5                 add gamma -1
6                 add gamma 1
7                 add saturation -1
8                 add saturation 1
9                 add hue -1
0                 add hue 1
Ctrl+BS           set contrast 0 ; set brightness 0 ; set gamma 0 ; set saturation 0 ; set hue 0

### ====================== 工具 ======================
F9                script-binding vcs-wall                                 # VCS 章節牆
Shift+F9          script-binding speed-menu                               # 速度選單
I                 script-binding display-stats-toggle                     # 統計資訊
`                 script-binding commands/open                            # 控制台
g-m               script-binding select/menu                              # select 總選單
g-p               script-binding select/show-properties                   # 屬性列表
Ctrl+r            script-message-to save_global_props clean_data          # 清除已記錄屬性

### ====================== 多媒體按鍵 ======================
POWER             quit                                                    # 退出
PLAY              set pause no                                            # 播放
PAUSE             set pause yes                                           # 暫停
PLAYPAUSE         cycle pause                                             # 切換
STOP              stop                                                    # 停止
REWIND            seek -30                                                # 倒退30秒
FORWARD           seek 30                                                 # 前進30秒
PREV              playlist-prev                                           # 上一首
NEXT              playlist-next                                           # 下一首

### ====================== 滑鼠 ======================
MBTN_BACK         playlist-prev                                           # 上一首
MBTN_FORWARD      playlist-next                                           # 下一首
MBTN_LEFT         cycle pause                                              # 點擊暫停/播放
MBTN_LEFT_DBL     cycle fullscreen                                        # 全螢幕
MBTN_RIGHT        context-menu                                            # 右鍵選單
Ctrl+MBTN_RIGHT   context-menu                                            # 原生選單
MBTN_RIGHT_DBL    ignore

ESC               set fullscreen no                                       # 退出全螢幕
ENTER             set fullscreen yes                                      # 全螢幕
Alt+ENTER         cycle fullscreen
UP                set pause yes ; seek -1 exact                           # 暫停並倒轉1秒
DOWN              set pause yes ; seek 1 exact                            # 暫停並前進1秒
LEFT              seek -5                                                 # 倒退5秒
RIGHT             seek 5                                                  # 前進5秒
Ctrl+UP           playlist-prev
Ctrl+DOWN         playlist-next
BS                no-osd set video-zoom 0 ; no-osd set panscan 0 ; no-osd set video-pan-x 0 ; no-osd set video-pan-y 0 ; no-osd set video-align-x 0 ; no-osd set video-align-y 0
Alt+MBTN_LEFT     script-binding positioning/drag-to-pan
Alt+WHEEL_DOWN    script-binding positioning/cursor-centric-zoom -0.1
Alt+WHEEL_UP      script-binding positioning/cursor-centric-zoom 0.1
