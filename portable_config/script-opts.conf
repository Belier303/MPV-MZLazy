### 文件_ https://github.com/hooke007/mpv_PlayKit/blob/main/portable_config/script-opts.conf
### 已移除 uosc 相關選項，改為 ModernZ

##⇘⇘腳本選項


##########
# 控制台 #
##########

#script-opts-append = console-monospace_font=LXGW WenKai Mono
 script-opts-append = console-font_size=16
 script-opts-append = console-scale_with_window=no


#############
# OSD命令列 #
#############

#script-opts-append = commands-persist_history=yes
 script-opts-append = commands-history_path=~~/_cache/command_history.txt


############
# 統計資料 #
############

 script-opts-append = stats-duration=2
 script-opts-append = stats-redraw_delay=0.5
 script-opts-append = stats-persistent_overlay=yes
 script-opts-append = stats-filter_params_max_length=1


########
# YTDL #
########

#script-opts-append = ytdl_hook-try_ytdl_first=yes
#script-opts-append = ytdl_hook-exclude="%.avi$|%.flv$|%.m3u$|%.m3u8$|%.m4v$|%.mkv$|%.mp4$|%.ts$|%.VOB$|%.webm$|%.wmv$"
#script-opts-append = ytdl_hook-use_manifests=yes


######################
# 上下文選單建置輔助 #
######################

 script-opts-append = contextmenu_plus-input_conf=~~/input_contextmenu_plus.conf
 script-opts-append = contextmenu_plus-uosc_alt=yes
#script-opts-append = contextmenu_plus-max_title_length=80
#script-opts-append = contextmenu_plus-max_playlist_items=30


####################
# 全域屬性儲存復原 #
####################

 script-opts-append = save_global_props-save_mode=2
 script-opts-append = save_global_props-props=volume,mute,glsl-shaders,vf,sub-font,sub-font-size,sub-border-size,sub-border-color,sub-shadow-offset,sub-bold,sub-color
#script-opts-append = save_global_props-cache_dir=~~/_cache/


##############
# 縮圖引擎 #
##############

#script-opts-append = thumb_engine-backend=ffmpeg
#script-opts-append = thumb_engine-max_height=270
#script-opts-append = thumb_engine-max_width=270
#script-opts-append = thumb_engine-network=yes
#script-opts-append = thumb_engine-hwdec=no
#script-opts-append = thumb_engine-sw_threads=3
 script-opts-append = thumb_engine-min_duration=30
#script-opts-append = thumb_engine-precise=2


