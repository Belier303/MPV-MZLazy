## 截圖設定檔
## 可在播放器中透過右鍵選單 > 截圖設定 切換格式與編輯
# 截圖格式: jpg, png, webp, jxl, avif
format=png
# 儲存路徑（~~desktop/ 為桌面）
directory=~~desktop
# 檔名模板（參數請參考 mpv 手冊 --screenshot-template）
template=%f-%{time-pos}
# JPEG 品質 (0-100)
jpeg_quality=100
# PNG 壓縮等級 (0-9)
png_compression=4
# WebP 無失真
webp_lossless=yes
# WebP 品質 (0-100)
webp_quality=100
# JXL 距離 (0=無損, 1=相當於 JPEG 90)
jxl_distance=1
