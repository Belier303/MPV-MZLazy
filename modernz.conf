# ModernZ 設定 — 適用於 mpv-lazy
# 語言
language=zh-TW
# 佈局: default, compact, mini, seekbar
layout=default
# 圖示主題: fluent 或 material
icon_theme=fluent
# 圖示樣式: mixed, filled, outline
icon_style=mixed
# OSC 字型
font=mpv-osd-symbols

# 顯示
idlescreen=yes
window_top_bar=auto
showwindowed=yes
showfullscreen=yes
showonselect=no
showonpause=yes
keeponpause=no

# 行為
hidetimeout=1500
fadeduration=200
fadein=yes
osc_on_seek=yes
osc_on_start=both
mouse_seek_pause=yes

# 縮放
vidscale=auto
scalewindowed=1.0
scalefullscreen=1.0

# 標題顯示
show_title=yes
title=${media-title}
title_font_size=24
truncate_title=no
show_window_title=no
window_title_font_size=26
window_controls=yes
windowcontrols_independent=yes

# 暫停指示器 — 關閉
pause_indicator=no
pause_indicator_lite=no

# 字幕與 OSD 邊距
sub_margins=yes
osd_margins=no
dynamic_margins=yes

# 按鈕
subtitles_button=yes
audio_tracks_button=yes
jump_buttons=yes
jump_amount=10
jump_more_amount=60
jump_icon_number=yes
chapter_skip_buttons=no
track_nextprev_buttons=yes

volume_control=yes
playlist_button=yes
fullscreen_button=yes
info_button=yes
ontop_button=yes
screenshot_button=yes
loop_button=yes
shuffle_button=no
speed_button=true

# 圖示尺寸
playpause_size=28
midbuttons_size=24
sidebuttons_size=24

# 色彩
osc_color=#000000
seekbarfg_color=#FF8232
seekbarbg_color=#999999
seek_handle_color=#C96508
time_color=#FFFFFF
side_buttons_color=#FFFFFF
playpause_color=#FFFFFF
hover_effect_color=#FF8232

# 淡化
osc_fade_strength=100
fade_blur_strength=100

# 進度條
seekbar_height=medium
seekrange=yes
seekbarkeyframes=yes
slider_rounded_corners=yes
nibbles_style=gap
automatickeyframemode=yes

# 滑鼠指令 — 截圖按鈕（左鍵截圖，右鍵開啟選單）
screenshot_mbtn_left_command=ignore
screenshot_mbtn_right_command=script-binding screenshot-menu

# 右鍵選單
title_mbtn_right_command=context-menu
